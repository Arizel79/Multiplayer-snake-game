server:
  host: "0.0.0.0"
  port: 8090
  name: "Slyth Server"
  description: "Welcome to the server!"
  max_players: 20
  admin_password: ""
  logging_level: "INFO"
  tps_log_interval: 5

game:
  map:
    width: 100
    height: 100
    food_perc: 5
  viewport:
    width: 100
    height: 75
    scale_factor: 1.0
  snake:
    default_length: 1
    min_length_fast_mode: 4
    default_mode:
      move_timeout: 0.1
      steal_chance: 0.003
    fast_mode:
      enable: true
      move_timeout: 0.05
      stealing_chance: 0.1

logging:
  level: "debug"